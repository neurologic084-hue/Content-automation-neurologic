<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <title>Cinematic Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #000; }
    #bg-video {
      position: absolute; top: 0; left: 0;
      width: 1080px; height: 1920px;
      object-fit: cover;
    }
    .scene-layer {
      position: absolute; top: 0; left: 0;
      width: 1080px; height: 1920px;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="cinematic"
    data-width="1080"
    data-height="1920"
    data-start="0"
    data-duration="__VIDEO_DURATION__"
  >
    <video id="bg-video" src="assets/source.mp4" muted playsinline
      data-start="0" data-duration="__VIDEO_DURATION__" data-track-index="0"></video>
    <audio id="bg-audio" src="assets/source.mp4"
      data-start="0" data-duration="__VIDEO_DURATION__" data-track-index="0" data-volume="1"></audio>

    <div id="overlays-layer" class="scene-layer"
      data-composition-id="overlays"
      data-composition-src="compositions/overlays.html"
      data-start="0" data-duration="__VIDEO_DURATION__"
      data-track-index="1" data-width="1080" data-height="1920"></div>

    <div id="captions-layer" class="scene-layer"
      data-composition-id="captions"
      data-composition-src="compositions/captions.html"
      data-start="0" data-duration="__VIDEO_DURATION__"
      data-track-index="2" data-width="1080" data-height="1920"></div>

    <div id="grain-layer" class="scene-layer"
      data-composition-id="grain-overlay"
      data-composition-src="compositions/grain-overlay.html"
      data-start="0" data-duration="__VIDEO_DURATION__"
      data-track-index="10" data-width="1080" data-height="1920"></div>

    <script>
      window.__timelines = window.__timelines || {};
      var mainTl = gsap.timeline({ paused: true });
      mainTl.set({}, {}, __VIDEO_DURATION__);
      window.__timelines['cinematic'] = mainTl;
    </script>
  </div>
</body>
</html>
