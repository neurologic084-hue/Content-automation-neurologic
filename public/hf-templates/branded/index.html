<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Branded Lower-Third Overlay</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    }

    #root {
      position: relative;
      width: 1080px;
      height: 1920px;
    }

    /* Lower-third band */
    #lower-third {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 340px;
      background: linear-gradient(180deg, rgba(255,79,23,0) 0%, rgba(255,79,23,0.95) 35%, #FF4F17 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 64px 52px;
      transform: translateY(100%);
    }

    #clinic-name {
      font-size: 64px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.03em;
      line-height: 1;
      opacity: 0;
      transform: translateX(-40px);
    }

    #tagline {
      font-size: 32px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      margin-top: 10px;
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateX(-40px);
    }

    /* Accent line */
    #accent-line {
      position: absolute;
      left: 64px;
      bottom: 160px;
      width: 0;
      height: 4px;
      background: #FFFFFF;
      border-radius: 2px;
    }

    /* Record dot — pulsing indicator */
    #record-dot {
      position: absolute;
      top: 56px;
      right: 64px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #FFFFFF;
      opacity: 0;
    }

    /* Top caption strip */
    #top-caption {
      position: absolute;
      top: 80px;
      left: 64px;
      right: 64px;
      font-size: 48px;
      font-weight: 700;
      color: #FFFFFF;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5), 0 0 60px rgba(0,0,0,0.3);
      line-height: 1.3;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="branded"
    data-width="1080"
    data-height="1920"
    data-start="0"
    data-duration="__VIDEO_DURATION__"
  >
    <div id="top-caption" data-track-index="10" data-start="0" data-duration="__VIDEO_DURATION__"></div>

    <div id="lower-third" data-track-index="11" data-start="0" data-duration="__VIDEO_DURATION__">
      <div id="accent-line"></div>
      <div id="record-dot"></div>
      <div id="clinic-name"></div>
      <div id="tagline"></div>
    </div>

    <script>
      const vars = (typeof window.__hyperframes !== 'undefined' && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables()
        : {};

      const clinicName = vars.clinicName || 'Your Clinic';
      const tagline    = vars.tagline    || 'Book your consultation today';
      const hook       = vars.hook       || '';
      const dur        = parseFloat('__VIDEO_DURATION__') || 30;

      document.getElementById('clinic-name').textContent = clinicName;
      document.getElementById('tagline').textContent = tagline;
      if (hook) document.getElementById('top-caption').textContent = hook;

      const tl = gsap.timeline({ paused: true });

      // Hook caption fades in at top
      if (hook) {
        tl.to('#top-caption', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.5);
        tl.to('#top-caption', { opacity: 0, duration: 0.4, ease: 'power2.in' }, dur * 0.4);
      }

      // Lower-third slides up from bottom
      const ltStart = dur - 8;
      tl.to('#lower-third', { y: 0, duration: 0.7, ease: 'power4.out' }, ltStart);

      // Accent line expands
      tl.to('#accent-line', { width: 80, duration: 0.4, ease: 'power2.out' }, ltStart + 0.4);

      // Clinic name slides in
      tl.to('#clinic-name', { opacity: 1, x: 0, duration: 0.5, ease: 'back.out(1.2)' }, ltStart + 0.5);

      // Tagline follows
      tl.to('#tagline', { opacity: 1, x: 0, duration: 0.4, ease: 'back.out(1.2)' }, ltStart + 0.7);

      // Record dot pulses
      tl.to('#record-dot', { opacity: 1, duration: 0.2 }, ltStart + 0.9);
      tl.to('#record-dot', { scale: 1.4, duration: 0.6, repeat: -1, yoyo: true, ease: 'power1.inOut' }, ltStart + 1);

      window.__timelines = window.__timelines || {};
      window.__timelines['branded'] = tl;
    </script>
  </div>
</body>
</html>
